name: Laravel CI process

on:
  push:
    branches:
      - master

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite
          coverage: none

      - name: Create Laravel directories
        run: |
          mkdir -p storage/framework/cache/data
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs
          mkdir -p bootstrap/cache

          chmod -R 775 storage
          chmod -R 775 bootstrap/cache

      - name: Copy environment file
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate application key
        run: php artisan key:generate

      - name: Install NPM dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build

      - name: Verify Laravel application
        run: php artisan --version

      - name: Clear Laravel caches
        run: |
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear

      - name: Clear cached configuration
        run: |
          rm -f bootstrap/cache/config.php
          php artisan config:clear

      - name: Run tests
        run: php artisan test

      - name: List routes
        run: php artisan route:list

      - name: Run database migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan migrate --force


      - name: CI successful
        if: success()
        run: |
          echo "=============================="
          echo "======= CI PASSED ============="
          echo "======= READY TO DEPLOY ========"
          echo "=============================="

      - name: CI failed
        if: failure()
        run: |
          echo "=============================="
          echo "======= CI FAILED ============="
          echo "=============================="

      - name: Finished statistics
        if: always()
        run: |
          echo "=============================="
          echo "Laravel CI process finished"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Committer: ${{ github.actor }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Workspace: ${{ github.workspace }}"
          echo "Date: $(date '+%d-%m-%Y %H:%M:%S')"
          echo "=============================="

      - name: Production branch
        if: github.ref == 'refs/heads/master'
        run: |
          echo "Ovaj workflow se izvršava na master grani."
          echo "Master branch"



      - name: Commit contains deploy
        if: contains(github.event.head_commit.message, 'deploy')
        run: |
          echo "Commit poruka sadrži riječ deploy."
          echo "Poruka commita: ${{ github.event.head_commit.message }}"
          echo "Test prije CD-a"
